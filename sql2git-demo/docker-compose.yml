services:
  postgres:
    #image: postgres:13.22-bookworm
    build: .
    container_name: sql2git-demo-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql2git_demo_db
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./pg_dumps:/var/lib/postgresql/dumps

volumes:
  pg_data:
  pg_dump: